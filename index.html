<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skill Assessment System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<!-- ================= HOME PAGE ================= -->
<section id="homePage" class="page active">
  <div class="center-card">
    <div class="card p-5 text-center" style="max-width: 420px;">
      <h1 class="mb-2">Skill Assessment System</h1>
      <p class="section-subtitle mb-4">Choose how you want to proceed</p>

      <div class="d-grid gap-3">
        <button class="btn btn-primary btn-lg" onclick="showPage('studentPage')">
          Student Login
        </button>
        <button class="btn btn-secondary btn-lg" onclick="showPage('instructorLoginPage')">
          Instructor Login
        </button>
      </div>
    </div>
  </div>
</section>

<!-- ================= STUDENT PAGE ================= -->
<section id="studentPage" class="page">
  <div class="container my-5 page-container">

    <button class="btn btn-outline-secondary mb-4" onclick="showPage('homePage')">
      ← Home
    </button>

    <div class="card p-4">
      <h2 class="section-title">Student Skill Assessment</h2>
      <p class="section-subtitle">
        Provide your current skill levels to identify gaps for your desired role
      </p>
      <hr class="section-divider">

      <form id="skillForm">

        <div class="mb-4">
          <label>Student Name</label>
          <input id="studentName" class="form-control mt-1" required>
        </div>

        <div class="mb-4">
          <label>Desired Job Role</label>
          <select id="jobRole" class="form-select mt-1" required>
            <option value="">Select</option>
            <option>Frontend Developer</option>
            <option>Backend Developer</option>
            <option>Cloud Engineer</option>
            <option>Data Analyst</option>
          </select>
        </div>

        <div class="skill-panel mt-4">
          <h5 class="panel-title mb-3">Skill Levels</h5>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label>Java</label>
              <select class="form-select skill mt-1" data-skill="Java">
                <option>1</option><option>2</option><option>3</option>
              </select>
            </div>

            <div class="col-md-4 mb-3">
              <label>Python</label>
              <select class="form-select skill mt-1" data-skill="Python">
                <option>1</option><option>2</option><option>3</option>
              </select>
            </div>

            <div class="col-md-4 mb-3">
              <label>HTML / CSS</label>
              <select class="form-select skill mt-1" data-skill="HTML/CSS">
                <option>1</option><option>2</option><option>3</option>
              </select>
            </div>

            <div class="col-md-4 mb-3">
              <label>JavaScript</label>
              <select class="form-select skill mt-1" data-skill="JavaScript">
                <option>1</option><option>2</option><option>3</option>
              </select>
            </div>

            <div class="col-md-4 mb-3">
              <label>Communication</label>
              <select class="form-select skill mt-1" data-skill="Communication">
                <option>1</option><option>2</option><option>3</option>
              </select>
            </div>

            <div class="col-md-4 mb-3">
              <label>Cloud Basics</label>
              <select class="form-select skill mt-1" data-skill="Cloud Basics">
                <option>1</option><option>2</option><option>3</option>
              </select>
            </div>
          </div>
        </div>

        <button class="btn btn-success w-100 mt-4">
          Analyze Skills
        </button>

      </form>
    </div>

    <div id="result" class="mt-4"></div>

  </div>
</section>

<!-- ================= INSTRUCTOR LOGIN PAGE ================= -->
<section id="instructorLoginPage" class="page">
  <div class="center-card">
    <div class="card p-5" style="max-width: 420px;">
      <h2 class="text-center mb-2">Instructor Login</h2>
      <p class="section-subtitle text-center mb-4">Authorized access only</p>

      <div class="mb-3">
        <label>Username</label>
        <input id="instructorUser" class="form-control mt-1">
      </div>

      <div class="mb-4">
        <label>Password</label>
        <input id="instructorPass" type="password" class="form-control mt-1">
      </div>

      <button class="btn btn-primary w-100" onclick="instructorLogin()">
        Login
      </button>

      <div id="loginError" class="text-danger text-center mt-3" style="display:none;">
        Invalid credentials
      </div>

      <button class="btn btn-outline-secondary w-100 mt-3" onclick="showPage('homePage')">
        ← Back
      </button>
    </div>
  </div>
</section>

<!-- ================= INSTRUCTOR PAGE ================= -->
<section id="instructorPage" class="page">
  <div class="container my-5 page-container">

    <button class="btn btn-outline-secondary mb-4" onclick="showPage('homePage')">
      ← Home
    </button>

    <div class="card p-4">
      <h2 class="section-title">Instructor Dashboard</h2>
      <p class="section-subtitle">Review all submitted student assessments</p>
      <hr class="section-divider">

      <div class="table-responsive">
        <table class="table align-middle">
  <tbody id="recordsTable"></tbody>
</table>
      </div>

      <button class="btn btn-danger mt-3" onclick="clearRecords()">
        Clear All Records
      </button>
    </div>

  </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
